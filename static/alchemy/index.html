<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 字符艺术矩阵生成器 (颜文字游戏)</title>
    <style>
        :root {
            --bg: #0b0b0e;
            --panel: #16161a;
            --accent: #00ffaa;
            --text: #e2e2e5;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--panel);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #2d2d38;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
            color: #aaa;
        }
        input, textarea, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 4px;
            background: #1f1f29;
            border: 1px solid #3d3d4d;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--accent);
            outline: none;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row > div {
            flex: 1;
        }
        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
        }
        button:hover {
            background: #00cc88;
            box-shadow: 0 0 10px rgba(0,255,170,0.3);
        }
        button:disabled {
            background: #444;
            color: #777;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-secondary {
            background: #2d2d38;
            color: #fff;
            border: 1px solid #3d3d4d;
        }
        .btn-secondary:hover {
            background: #3d3d4d;
        }
        /* 字符画显示区域：核心是等宽字体和禁止换行 */
        #artCanvas {
            background: #000;
            color: #00ff55;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            white-space: pre;
            overflow-x: auto;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #222;
            margin-top: 20px;
            min-height: 200px;
            font-size: 13px;
            line-height: 1.2;
        }
        #terminal {
            background: #050507;
            font-family: monospace;
            padding: 10px;
            border-radius: 6px;
            height: 60px;
            overflow-y: auto;
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            border: 1px solid #1a1a22;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-top: 0; color: var(--accent);">🎨 AI 颜文字与字符艺术矩阵生成器</h2>
    <p style="text-align: center; color: #788; font-size: 13px; margin-top: -10px;">输入你的画面幻想，让大模型用纯字符为你作画</p>

    <div class="input-group">
        <label>第一步：配置 OpenRouter 认证</label>
        <div class="row">
            <input type="password" id="keyInput" placeholder="请输入你的密钥 (sk-or-v1-...)">
            <button class="btn-secondary" style="width: 160px;" onclick="fetchLiveModels()">🔄 更新模型列表</button>
        </div>
    </div>

    <div class="input-group">
        <label>第二步：选择生成模型</label>
        <select id="modelInput">
            <option value="openrouter/free">🎁 openrouter/free (官方智能免费路由兜底)</option>
        </select>
    </div>

    <div class="input-group">
        <label>第三步：描述你想生成的画面 (Prompt)</label>
        <textarea id="promptInput" rows="3" placeholder="例如：一架在夜空中飞行的机动战士高达、一架正在发射导弹的战斗机、或者一只可爱的猫咪。"></textarea>
    </div>

    <button id="generateBtn" onclick="generateAsciiArt()">✨ 生成颜文字字符图片</button>

    <div id="terminal">> 绘图控制台已就绪。请配置 Key 并选择你的渲染模型。</div>

    <div id="artCanvas">等待画布渲染...</div>
</div>

<script>
    const logDiv = document.getElementById('terminal');
    const modelSelect = document.getElementById('modelInput');
    const canvasDiv = document.getElementById('artCanvas');

    function log(msg, color = "#888") {
        logDiv.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 🔄 动态获取模型列表：强制保留 openrouter/free 在首行
    async function fetchLiveModels() {
        const key = document.getElementById('keyInput').value;
        log("正在向 OpenRouter 终点拉取全量模型生态...", "#ffaa00");

        try {
            // 获取模型列表不需要强依赖认证，但带上可以获取针对该 Key 解锁的专属模型
            const response = await fetch("https://openrouter.ai/api/v1/models");
            if (!response.ok) throw new Error("同步失败");
            const rawData = await response.json();
            const models = rawData.data;

            if (models && models.length > 0) {
                // 💥 核心：只清空索引 1 之后的选项，死锁第一行的 openrouter/free
                while (modelSelect.options.length > 1) {
                    modelSelect.remove(1);
                }

                const freeModels = [];
                const paidModels = [];

                models.forEach(m => {
                    if (m.id === "openrouter/free") return; // 跳过本身
                    if (m.id.includes(':free')) freeModels.push(m);
                    else paidModels.push(m);
                });

                freeModels.sort((a,b) => a.id.localeCompare(b.id));
                paidModels.sort((a,b) => a.id.localeCompare(b.id));

                // 渲染免费模型组
                const optGroupFree = document.createElement('optgroup');
                optGroupFree.label = "🎁 免费模型通道";
                freeModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.innerText = `✨ ${m.name}`;
                    optGroupFree.appendChild(opt);
                });
                modelSelect.appendChild(optGroupFree);

                // 渲染付费模型组
                const optGroupPaid = document.createElement('optgroup');
                optGroupPaid.label = "💰 商业全量模型";
                paidModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.innerText = `🪪 ${m.name}`;
                    optGroupPaid.appendChild(opt);
                });
                modelSelect.appendChild(optGroupPaid);

                log(`列表刷新成功！已成功追加同步全量模型。`, "#00ffaa");
            }
        } catch (e) {
            log("获取模型列表失败，请检查网络。已为您保持默认免费路由选项。", "#ff3366");
        }
    }

    // ✨ 核心逻辑：呼叫 LLM 渲染纯字符图片矩阵
    async function generateAsciiArt() {
        const key = document.getElementById('keyInput').value;
        const model = document.getElementById('modelInput').value;
        const prompt = document.getElementById('promptInput').value;

        if(!key) { alert("请先填写 OpenRouter API Key！"); return; }
        if(!prompt) { alert("你想画什么？请输入画面描述！"); return; }

        document.getElementById('generateBtn').disabled = true;
        canvasDiv.style.color = "#00ff55"; // 重置为原力绿
        canvasDiv.innerText = "AI 正在疯狂敲击键盘，绘制字符矩阵中，请稍候...";
        log(`正在请求 [${model}] 绘制字符蓝图...`, "#ffcc00");

        // 严格规范大模型的输出，防止它吐出废话破坏画布
        const systemPrompt = `你是一个顶级字符画（ASCII Art）艺术家。请根据用户的描述，生成一张由纯字符、特殊符号或颜文字组成的字符画矩阵。
规范要求：
1. 必须是一幅完整的图形矩阵，宽度控制在 40-80 个字符之间，高度控制在 15-30 行之间。
2. 只能输出字符画文本本身。绝对不能包含任何普通的解释文字、问候语，也绝对不能用 \`\`\` 符号或 \`\`\`text 等 markdown 标记包裹。
3. 请发挥你的空间想象力，用密度不同的符号（如 @, #, *, +, =, -, :, ., 或者是特定的颜文字符号）组合出明暗与线条，使其看起来惟妙惟肖。`;

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": model,
                    "messages": [
                        {"role": "system", "content": systemPrompt},
                        {"role": "user", "content": prompt}
                    ]
                })
            });

            if(!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || "网络请求熔断");
            }

            const data = await response.json();
            let art = data.choices?.[0]?.message?.content;

            if (!art) {
                throw new Error("模型没有吐出任何矩阵像素，请重试或更换模型。");
            }

            // 完美的防御性清洗：如果某些模型不听话还是带了 markdown 标记，将其洗掉
            art = art.trim();
            if (art.includes("```")) {
                art = art.replace(/```[a-zA-Z]*|```/g, "").trim();
            }

            // 将洗干净的字符画直接丢进等宽字体的 Canvas 容器中
            canvasDiv.innerText = art;
            log(`画布渲染成功！渲染引擎：${model}`, "#00ffaa");

        } catch (e) {
            canvasDiv.style.color = "#ff3366";
            canvasDiv.innerText = `画布坍塌。原因: ${e.message}`;
            log(`生成终止。原因: ${e.message}`, "#ff3366");
        } finally {
            document.getElementById('generateBtn').disabled = false;
        }
    }
</script>

</body>
</html>
