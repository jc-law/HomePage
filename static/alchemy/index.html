<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 元素觉醒：卡牌实验室 (线上容灾版)</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #141419;
            --accent: #ffaa00;
            --text: #e3e3e6;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .layout {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }
        .config-side {
            flex: 1;
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2d2d38;
        }
        .card-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0d11;
            border: 2px dashed #2d2d38;
            border-radius: 12px;
            min-height: 400px;
            padding: 20px;
        }
        input, textarea, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1f1f29;
            border: 1px solid #3d3d4d;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        .card-display {
            background: linear-gradient(145deg, #1e1e26, #141419);
            border: 2px solid var(--accent);
            border-radius: 16px;
            width: 280px;
            height: 400px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(255,170,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }
        #terminal {
            background: #050507;
            font-family: monospace;
            padding: 10px;
            border-radius: 6px;
            height: 100px;
            overflow-y: auto;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 20px;">
    <h2>🔮 元素觉醒：AI 卡牌编译实验室</h2>
    <p style="color: #8aa; margin: 0;">Hugo 线上直连部署版 • 默认强保全局免费路由</p>
</div>

<div class="layout">
    <div class="config-side">
        <label>OpenRouter API Key:</label>
        <input type="password" id="keyInput" placeholder="请输入密钥 (sk-or-v1-...)">

        <label style="margin-top: 10px; display: block;">选择觉醒模型：</label>
        <select id="modelInput">
            <option value="openrouter/free">🎁 OpenRouter 智能分配免费通道 (默认首选/高容灾)</option>
        </select>

        <label style="margin-top: 15px; display: block;">输入注入的觉醒材料/引子 (Prompt)：</label>
        <textarea id="promptInput" rows="3" placeholder="例如：揉入一颗破碎的微型超新星核心，让卡牌彻底转化为狂暴的湮灭星尘属性。"></textarea>

        <button id="compileBtn" onclick="awakenElementCard()">✨ 引导元素觉醒</button>

        <h4 style="margin-top: 15px; margin-bottom: 5px;">🔮 召唤日志:</h4>
        <div id="terminal">> 祭坛已就绪。正在同步后台全量备用模型...</div>
    </div>

    <div class="card-side" id="cardContainer">
        <div style="color: #556; text-align: center;">等待元素注入...</div>
    </div>
</div>

<script>
    const logDiv = document.getElementById('terminal');
    const modelSelect = document.getElementById('modelInput');

    function log(msg, color = "#888") {
        logDiv.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 🌐 后台异步静默抓取模型列表，绝对不影响 openrouter/free 的默认选中状态
    async function fetchLiveModels() {
        try {
            const response = await fetch("https://openrouter.ai/api/v1/models");
            if (!response.ok) throw new Error();
            const rawData = await response.json();
            const models = rawData.data;

            if (models && models.length > 0) {
                // 💥 关键点：不清空选择框，只保留第一个（即 openrouter/free），把后续抓到的追加进来
                while (modelSelect.options.length > 1) {
                    modelSelect.remove(1);
                }

                const freeModels = [];
                const paidModels = [];

                models.forEach(m => {
                    // 过滤掉重复的全局免费路由名本身
                    if (m.id === "openrouter/free") return;
                    if (m.id.includes(':free')) freeModels.push(m);
                    else paidModels.push(m);
                });

                freeModels.sort((a,b) => a.id.localeCompare(b.id));
                paidModels.sort((a,b) => a.id.localeCompare(b.id));

                const optGroupFree = document.createElement('optgroup');
                optGroupFree.label = "🎁 OPENROUTER 实时免费模型 (特定通道)";
                freeModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.innerText = `✨ ${m.name} (${m.id})`;
                    optGroupFree.appendChild(opt);
                });
                modelSelect.appendChild(optGroupFree);

                const optGroupPaid = document.createElement('optgroup');
                optGroupPaid.label = "💰 商业付费模型 (需要账户余额)";
                paidModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.innerText = `🪪 ${m.name}`;
                    optGroupPaid.appendChild(opt);
                });
                modelSelect.appendChild(optGroupPaid);

                log(`备用模型同步成功！已在下方加载 ${models.length} 个全球模型组。`, "#00ffcc");
            }
        } catch (e) {
            log("备用模型动态同步受限，已保持默认安全路由通道运行。", "#ff9900");
        }
    }

    // 核心卡牌编译逻辑
    async function awakenElementCard() {
        const key = document.getElementById('keyInput').value;
        const model = document.getElementById('modelInput').value;
        const prompt = document.getElementById('promptInput').value;

        if(!key) { alert("请输入你的 OpenRouter API Key！"); return; }
        if(!prompt) { alert("请填写觉醒材料描述！"); return; }

        document.getElementById('compileBtn').disabled = true;
        log(`正在通过端点 [${model}] 唤醒元素共鸣...`, "#ffcc00");

        // 温柔的系统提示词，不包含恐吓模型的强限制词，防止 Provider 拒绝握手
        const systemPrompt = `你是一个游戏运行时的卡牌元素觉醒编译器。请根据玩家输入的觉醒材料描述，生成觉醒后的新卡牌。
你必须返回一个合法的 JSON 格式数据，包含以下字段：
{
  "name": "觉醒后的新卡牌名字",
  "element": "新卡牌的主力元素属性",
  "attack": 最终攻击力数值(取值范围在500到9999之间),
  "description": "酷炫的觉醒技能描述短文本"
}`;

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": model,
                    "messages": [
                        {"role": "system", "content": systemPrompt},
                        {"role": "user", "content": prompt}
                    ]
                })
            });

            if(!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || "Provider 熔断拒绝");
            }
            
            const data = await response.json();
            let content = data.choices[0].message.content.trim();
            
            // 鲁棒性清洗：兼容带不带 markdown 反引号的各种返回情况
            if(content.includes("```")) {
                content = content.replace(/```json?|```/g, "").trim();
            }

            const card = JSON.parse(content);
            
            // 动态渲染生成的实体卡牌
            document.getElementById('cardContainer').innerHTML = `
                <div class="card-display">
                    <div style="border-bottom: 1px solid #444; padding-bottom: 5px;">
                        <span style="font-size: 18px; font-weight: bold; color: #fff;">${card.name}</span>
                        <span style="float: right; font-size: 12px; background: #333; padding: 2px 6px; border-radius: 4px; color: var(--accent);">${card.element}</span>
                    </div>
                    <div style="text-align: center; margin: 30px 0; font-size: 14px; color: #aaa; font-style: italic;">
                        "${card.description}"
                    </div>
                    <div style="border-top: 1px solid #444; padding-top: 5px; font-family: monospace; text-align: right;">
                        <span style="color: #888;">ATK /</span> <span style="font-size: 20px; font-weight: bold; color: var(--accent);">${card.attack}</span>
                    </div>
                </div>
            `;
            log(`觉醒成功！实体卡牌【${card.name}】已成功投影。`, "#00ffcc");

        } catch (e) {
            log(`召唤失败。原因: ${e.message}。建议保持默认的 openrouter/free 或更换其余免费通道重试。`, "#ff3366");
        } finally {
            document.getElementById('compileBtn').disabled = false;
        }
    }

    // 初始化加载
    window.onload = () => {
        fetchLiveModels();
    };
</script>

</body>
</html>
