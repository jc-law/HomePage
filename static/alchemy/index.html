<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 元素觉醒：卡牌实验室 (全量模型豪华版)</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #141419;
            --accent: #ffaa00;
            --text: #e3e3e6;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .layout {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }
        .config-side {
            flex: 1;
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2d2d38;
        }
        .card-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0d11;
            border: 2px dashed #2d2d38;
            border-radius: 12px;
            min-height: 400px;
            padding: 20px;
        }
        input, textarea, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1f1f29;
            border: 1px solid #3d3d4d;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        .card-display {
            background: linear-gradient(145deg, #1e1e26, #141419);
            border: 2px solid var(--accent);
            border-radius: 16px;
            width: 280px;
            height: 400px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(255,170,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }
        #terminal {
            background: #050507;
            font-family: monospace;
            padding: 10px;
            border-radius: 6px;
            height: 100px;
            overflow-y: auto;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 20px;">
    <h2>🔮 元素觉醒：AI 卡牌编译实验室</h2>
    <p style="color: #8aa; margin: 0;">Hugo 线上高级版 • 智能免费路由首发，全量商业模型动态解锁</p>
</div>

<div class="layout">
    <div class="config-side">
        <label>OpenRouter API Key:</label>
        <input type="password" id="keyInput" placeholder="请输入密钥 (sk-or-v1-...)">

        <label style="margin-top: 10px; display: block;">选择觉醒模型 (已动态同步全球最新商业/免费模型)：</label>
        <select id="modelInput">
            <option value="openrouter/free">🎁 OpenRouter 智能分配免费通道 (零余额高容灾)</option>
        </select>

        <label style="margin-top: 15px; display: block;">输入注入的觉醒材料/引子 (Prompt)：</label>
        <textarea id="promptInput" rows="3" placeholder="例如：揉入一颗破碎的微型超新星核心，让卡牌彻底转化为狂暴的湮灭星尘属性。"></textarea>

        <button id="compileBtn" onclick="awakenElementCard()">✨ 引导元素觉醒</button>

        <h4 style="margin-top: 15px; margin-bottom: 5px;">🔮 召唤日志:</h4>
        <div id="terminal">> 祭坛已就绪。正在同步 OpenRouter 全量模型生态...</div>
    </div>

    <div class="card-side" id="cardContainer">
        <div style="color: #556; text-align: center;">等待元素注入...</div>
    </div>
</div>

<script>
    const logDiv = document.getElementById('terminal');
    const modelSelect = document.getElementById('modelInput');

    function log(msg, color = "#888") {
        logDiv.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 🌐 无缝拉取全量模型列表（包含付费顶级模型）
    async function fetchLiveModels() {
        try {
            const response = await fetch("https://openrouter.ai/api/v1/models");
            if (!response.ok) throw new Error();
            const rawData = await response.json();
            const models = rawData.data;

            if (models && models.length > 0) {
                // 锁死第一行的 openrouter/free 不动
                while (modelSelect.options.length > 1) {
                    modelSelect.remove(1);
                }

                const freeModels = [];
                const paidModels = [];

                models.forEach(m => {
                    if (m.id === "openrouter/free") return;
                    
                    // 只要 ID 里带 :free 或者是特定的已知免费模型就分到免费组
                    if (m.id.includes(':free')) {
                        freeModels.push(m);
                    } else {
                        paidModels.push(m);
                    }
                });

                // 按字母排序
                freeModels.sort((a,b) => a.id.localeCompare(b.id));
                paidModels.sort((a,b) => a.id.localeCompare(b.id));

                // 1. 渲染免费组
                const optGroupFree = document.createElement('optgroup');
                optGroupFree.label = "🎁 免费畅玩模型通道 (零余额可用)";
                freeModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.innerText = `✨ ${m.name} (${m.id})`;
                    optGroupFree.appendChild(opt);
                });
                modelSelect.appendChild(optGroupFree);

                // 2. 渲染付费高级模型组（完美解锁高级 API Key 的全部实力）
                const optGroupPaid = document.createElement('optgroup');
                optGroupPaid.label = "🔥 商业旗舰/高阶模型 (需 Key 内有可用余额)";
                paidModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    // 如果模型有价格上下文信息，优雅地展示出来
                    const ctxLen = m.context_length ? ` [${Math.round(m.context_length/1024)}K]` : '';
                    opt.innerText = `🪪 ${m.name}${ctxLen}`;
                    optGroupPaid.appendChild(opt);
                });
                modelSelect.appendChild(optGroupPaid);

                log(`全量模型同步成功！已解锁 ${free
