<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Alchemy: 元素觉醒 (AI原生游戏)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00ffcc;
            --border-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        .setup-panel, .game-panel {
            background: var(--card-color);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        input, select, button, textarea {
            background: #252525;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-color);
            outline: none;
        }
        button {
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            margin-top: 15px;
        }
        button:hover {
            background: #00ccaa;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            transform: translateY(-1px);
        }
        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .battlefield {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            gap: 20px;
        }
        .monster-card {
            background: #252525;
            border: 2px solid #444;
            border-radius: 10px;
            width: 50%;
            padding: 20px;
            text-align: center;
            transition: border-color 0.5s;
        }
        .monster-card.active {
            border-color: var(--accent-color);
            background: #1a2926;
        }
        .monster-avatar {
            font-family: 'Courier New', Courier, monospace;
            white-space: pre;
            background: #0a0a0a;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 12px;
            color: #33ff33;
            overflow-x: auto;
            line-height: 1.2;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status {
            font-weight: bold;
            color: #ffcc00;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 204, 0, 0.1);
            border-radius: 6px;
            text-align: center;
        }
        .el-row {
            display: flex;
            gap: 15px;
        }
        .el-col {
            flex: 1;
        }
        .sync-btn {
            background: #333;
            color: #aaa;
            font-size: 12px;
            padding: 5px 10px;
            margin: 0;
            width: auto;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧪 Prompt Alchemy: 元素觉醒</h2>
    <p style="font-size: 0.95em; color: #aaa; margin-top: -10px;">一款运行时完全由 AI Token 驱动属性与画面生成的原生游戏 (AI-Native Game)。</p>

    <div class="setup-panel" id="setupPanel">
        <h3>🔑 配置您的 OpenRouter API</h3>
        <label for="apiKey">API Key:</label>
        <input type="password" id="apiKey" placeholder="输入您的 OpenRouter 密钥 (sk-or-v1-...)" value="">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
            <label for="modelId" style="margin: 0;">选择推理模型：</label>
            <button class="sync-btn" onclick="syncModels()">🔄 联网同步最新列表</button>
        </div>
        <select id="modelId">
            <option value="google/gemini-2.5-flash">Google: Gemini 2.5 Flash (推荐：极速且最省Token)</option>
            <option value="deepseek/deepseek-chat">DeepSeek: DeepSeek V3</option>
            <option value="meta-llama/llama-3.3-70b-instruct">Meta: Llama 3.3 70B</option>
            <option value="anthropic/claude-3.5-haiku">Anthropic: Claude 3.5 Haiku</option>
            <option value="openai/gpt-4o-mini">OpenAI: GPT-4o Mini</option>
        </select>
        
        <button onclick="startGame()">进入游戏</button>
    </div>

    <div class="game-panel" id="gamePanel" style="display:none;">
        <div class="el-row">
            <div class="el-col">
                <label for="elemA">选择基础元素 A:</label>
                <select id="elemA">
                    <option value="🔥 熔岩机械">🔥 熔岩机械</option>
                    <option value="💧 幽灵史莱姆">💧 幽灵史莱姆</option>
                    <option value="⚡ 狂暴雷电">⚡ 狂暴雷电</option>
                    <option value="🌲 古老树精">🌲 古老树精</option>
                </select>
            </div>
            <div class="el-col">
                <label for="elemB">选择基础元素 B:</label>
                <select id="elemB">
                    <option value="💀 诅咒暗影">💀 诅咒暗影</option>
                    <option value="⚙️ 蒸汽齿轮">⚙️ 蒸汽齿轮</option>
                    <option value="❄️ 极寒冰晶">❄️ 极寒冰晶</option>
                    <option value="✨ 神圣光芒">✨ 神圣光芒</option>
                </select>
            </div>
        </div>

        <label for="playerPrompt">注入炼金提示词 (Prompt) - 引导大模型塑造怪物的形态与特殊异能：</label>
        <textarea id="playerPrompt" rows="3" placeholder="例如：让它们完美交融，诞生一只带有蒸汽朋克风格、能喷射冰火能量的机械巨龙！"></textarea>
        
        <button id="summonBtn" onclick="summonMonster()">✨ 消耗 Token：融合召唤！</button>

        <div class="status" id="gameStatus">准备就绪，请输入创意提示词召唤你的炼金兽...</div>

        <div class="battlefield">
            <div class="monster-card" id="playerCard">
                <h4>🔮 你的炼金兽</h4>
                <div id="pName" style="font-weight: bold; color: var(--accent-color);">? ? ?</div>
                <div class="monster-avatar" id="pAvatar">(等待融合大阵激活)</div>
                <div id="pStats" style="font-weight: bold;">HP: -- | ATK: --</div>
                <div id="pSkill" style="font-size:0.85em; color:#aaa; margin-top:8px; min-height: 32px;">技能: --</div>
            </div>

            <div class="monster-card" id="enemyCard">
                <h4>👾 守关智能Boss</h4>
                <div id="eName" style="font-weight: bold; color: #ff3366;">末日赛博巨兽</div>
                <div class="monster-avatar" id="eAvatar">
  /\_/\
 ( o.o )
  > ^ <
[CYBER]
                </div>
                <div id="eStats" style="font-weight: bold;">HP: 120 | ATK: 24</div>
                <div id="eSkill" style="font-size:0.85em; color:#aaa; margin-top:8px; min-height: 32px;">技能: 毁灭射线 (对敌方造成无差别高额打击)</div>
            </div>
        </div>
        
        <button id="battleBtn" style="display: none; background: #ff3366; color: white;" onclick="startBattle()">⚔️ 派遣创造物，开始战斗！</button>
    </div>
</div>

<script>
    let playerMonster = null;
    const enemyMonster = { name: "末日赛博巨兽", hp: 120, atk: 24 };

    // 独立出来的异步模型同步函数，点按钮才会触发，绝对不阻塞初始化
    async function syncModels() {
        const modelSelect = document.getElementById('modelId');
        const syncBtn = document.querySelector('.sync-btn');
        syncBtn.innerText = "⏳ 同步中...";
        syncBtn.disabled = true;

        try {
            const response = await fetch("https://openrouter.ai/api/v1/models");
            if (!response.ok) throw new Error("CORS 或网络阻断");
            const json = await response.json();
            
            modelSelect.innerHTML = ""; 
            const recommendedBrands = ['google', 'meta-llama', 'anthropic', 'openai', 'deepseek'];
            
            json.data.forEach(model => {
                const brand = model.id.split('/')[0];
                if (recommendedBrands.includes(brand)) {
                    const opt = document.createElement('option');
                    opt.value = model.id;
                    const ctx = model.context_length ? `[${Math.round(model.context_length/1024)}K]` : '';
                    opt.innerText = `${model.name} ${ctx} (${model.id})`;
                    modelSelect.appendChild(opt);
                }
            });
            modelSelect.value = "google/gemini-2.5-flash";
            syncBtn.innerText = "✅ 同步成功";
        } catch (error) {
            console.error(error);
            syncBtn.innerText = "❌ 同500或跨域失败";
            alert("由于浏览器跨域策略(CORS)或网络限制，无法实时抓取。已自动保留本地预设模型列表，不影响游戏游玩！");
        } finally {
            setTimeout(() => {
                syncBtn.innerText = "🔄 联网同步最新列表";
                syncBtn.disabled = false;
            }, 2000);
        }
    }

    function startGame() {
        const key = document.getElementById('apiKey').value;
        if(!key) {
            alert('BYOK 模式需要您输入有效的 OpenRouter API Key！');
            return;
        }
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
    }

    async function summonMonster() {
        const apiKey = document.getElementById('apiKey').value;
        const model = document.getElementById('modelId').value;
        const elemA = document.getElementById('elemA').value;
        const elemB = document.getElementById('elemB').value;
        const playerPrompt = document.getElementById('playerPrompt').value;

        if(!playerPrompt) {
            alert('炼金需要意志引导，请填写提示词！');
            return;
        }

        document.getElementById('summonBtn').disabled = true;
        document.getElementById('battleBtn').style.display = 'none';
        document.getElementById('playerCard').classList.remove('active');
        document.getElementById('gameStatus').innerText = "🔮 正在向 OpenRouter 发送 Token，AI 引擎正在实时推理属性、渲染像素图案...";

        const systemPrompt = `你是一款游戏后端的实时规则与视觉渲染引擎。
请根据玩家提供的两个基础元素和融合提示词，创造一个对战怪物。
必须严格返回以下标准 JSON 格式，不要包含任何 markdown 标记（不要用 \`\`\`json），直接输出大括号包裹的纯文本 JSON：
{
  "name": "怪物名字(10字以内)",
  "hp": 随机70-150之间的整数,
  "atk": 随机15-35之间的整数,
  "skill": "技能名字和简短说明",
  "ascii_art": "用字符画一幅符合该怪物形象的简易ASCII艺术画(高度4-5行，宽度控制在20个字符以内，内部严禁使用任何反引号，直接用换行符\\n分隔)"
}`;

        const userContent = `基础元素A: ${elemA}, 基础元素B: ${elemB}. 玩家融合创意: ${playerPrompt}`;

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json",
                    "HTTP-Referer": "https://ai-native-game.local", 
                    "X-Title": "Prompt Alchemy"
                },
                body: JSON.stringify({
                    "model": model,
                    "messages": [
                        {"role": "system", "content": systemPrompt},
                        {"role": "user", "content": userContent}
                    ],
                    "response_format": { "type": "json_object" }
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "接口调用失败");
            }

            const data = await response.json();
            let rawContent = data.choices[0].message.content.trim();
            
            if (rawContent.startsWith("```")) {
                rawContent = rawContent.replace(/^```json?/, "").replace(/```$/, "").trim();
            }

            const result = JSON.parse(rawContent);
            
            playerMonster = result;
            document.getElementById('pName').innerText = result.name;
            document.getElementById('pAvatar').innerText = result.ascii_art || " (/)_(\) \n ( o.o ) \n  > ^ < ";
            document.getElementById('pStats').innerText = `HP: ${result.hp} | ATK: ${result.atk}`;
            document.getElementById('pSkill').innerText = `技能: ${result.skill}`;
            
            document.getElementById('playerCard').classList.add('active');
            document.getElementById('gameStatus').innerText = `✨ 召唤成功！远古大阵中走出了【${result.name}】！`;
            document.getElementById('battleBtn').style.display = 'block';
        } catch (error) {
            console.error(error);
            document.getElementById('gameStatus').innerText = `❌ 召唤失败。原因: ${error.message}。建议检查 API Key 或更换模型重试。`;
        } finally {
            document.getElementById('summonBtn').disabled = false;
        }
    }

    function startBattle() {
        if(!playerMonster) return;
        document.getElementById('gameStatus').innerText = "⚔️ 战火已燃！";
        
        let pHp = playerMonster.hp;
        let eHp = enemyMonster.hp;
        let log = "⚔️ === 战斗回合播报 === ⚔️\n\n";

        log += `【${playerMonster.name}】仰天长啸，激活动态技能 [${playerMonster.skill.split('：')[0]}]！\n`;
        eHp -= playerMonster.atk;
        log += `💥 痛击守关Boss，造成了 ${playerMonster.atk} 点伤害！Boss 剩余生命: ${Math.max(0, eHp)}\n\n`;

        if(eHp > 0) {
            log += `【${enemyMonster.name}】陷入暴怒，回敬了一记 [毁灭射线]！\n`;
            pHp -= enemyMonster.atk;
            log += `💥 你的造物受到了 ${enemyMonster.atk} 点伤害！你剩余生命: ${Math.max(0, pHp)}\n\n`;
        }

        log += "🏁 === 结算结果 === 🏁\n";
        if(eHp <= 0) {
            log += `🏆 奇迹！你用 Prompt 编织出的 AI 生物成功击碎了赛博巨兽！`;
        } else if(pHp <= 0) {
            log += `💀 战败！Boss 的防线坚不可摧。调整下你的提示词再来一次吧！`;
        } else {
            if(pHp > eHp) {
                log += `⚖️ 由于你的生物血量残余较多 (${pHp} vs ${eHp})，评委判定你获得小胜！`;
            } else {
                log += `⚖️ 回合结束，Boss 以微弱的血量优势守住了擂台，你惜败！`;
            }
        }

        alert(log);
        document.getElementById('gameStatus').innerText = "战斗已完结。你可以修改融合配方与提示词，开启下一轮 Token 炼金！";
    }
</script>

</body>
</html>
