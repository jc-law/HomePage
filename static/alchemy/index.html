<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Alchemy: 元素觉醒 (火山引擎版)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00ffcc;
            --border-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        .setup-panel, .game-panel {
            background: var(--card-color);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        input, button, textarea, select {
            background: #252525;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus, textarea:focus {
            border-color: var(--accent-color);
            outline: none;
        }
        button {
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            margin-top: 15px;
        }
        button:hover {
            background: #00ccaa;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            transform: translateY(-1px);
        }
        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .battlefield {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            gap: 20px;
        }
        .monster-card {
            background: #252525;
            border: 2px solid #444;
            border-radius: 10px;
            width: 50%;
            padding: 20px;
            text-align: center;
            transition: border-color 0.5s;
        }
        .monster-card.active {
            border-color: var(--accent-color);
            background: #1a2926;
        }
        .monster-avatar {
            font-family: 'Courier New', Courier, monospace;
            white-space: pre;
            background: #0a0a0a;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 12px;
            color: #33ff33;
            overflow-x: auto;
            line-height: 1.2;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status {
            font-weight: bold;
            color: #ffcc00;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 204, 0, 0.1);
            border-radius: 6px;
            text-align: center;
        }
        .el-row {
            display: flex;
            gap: 15px;
        }
        .el-col {
            flex: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧪 Prompt Alchemy: 元素觉醒 (火山方舟版)</h2>
    <p style="font-size: 0.95em; color: #aaa; margin-top: -10px;">基于字节跳动火山引擎大模型运行的 AI 原生游戏。</p>

    <div class="setup-panel" id="setupPanel">
        <h3>🔑 配置您的火山引擎 API</h3>
        
        <label for="apiKey">Volcengine API Key:</label>
        <input type="password" id="apiKey" placeholder="请输入在火山方舟生成的 API Key" value="">
        
        <label for="endpointId">接入点 ID (Endpoint ID):</label>
        <input type="text" id="endpointId" placeholder="例如: ep-2026xxxxxxxx-xxxxx (必须填写，否则无法调用)" value="">
        <p style="font-size: 0.8em; color: #888; margin-top: -4px;">* 注：火山引擎必须通过在线部署的接入点 ID 来调用具体模型（如 Doubao-pro 等）。</p>
        
        <button onclick="startGame()">确认并进入游戏</button>
    </div>

    <div class="game-panel" id="gamePanel" style="display:none;">
        <div class="el-row">
            <div class="el-col">
                <label for="elemA">选择基础元素 A:</label>
                <select id="elemA">
                    <option value="🔥 熔岩机械">🔥 熔岩机械</option>
                    <option value="💧 幽灵史莱姆">💧 幽灵史莱姆</option>
                    <option value="⚡ 狂暴雷电">⚡ 狂暴雷电</option>
                    <option value="🌲 古老树精">🌲 古老树精</option>
                </select>
            </div>
            <div class="el-col">
                <label for="elemB">选择基础元素 B:</label>
                <select id="elemB">
                    <option value="💀 诅咒暗影">💀 诅咒暗影</option>
                    <option value="⚙️ 蒸汽齿轮">⚙️ 蒸汽齿轮</option>
                    <option value="❄️ 极寒冰晶">❄️ 极寒冰晶</option>
                    <option value="✨ 神圣光芒">✨ 神圣光芒</option>
                </select>
            </div>
        </div>

        <label for="playerPrompt">注入炼金提示词 (Prompt) - 引导大模型塑造怪物的形态与特殊异能：</label>
        <textarea id="playerPrompt" rows="3" placeholder="例如：让它们完美交融，诞生一只带有蒸汽朋克风格、能喷射冰火能量的机械巨龙！"></textarea>
        
        <button id="summonBtn" onclick="summonMonster()">✨ 消耗 Token：融合召唤！</button>

        <div class="status" id="gameStatus">准备就绪，请输入创意提示词召唤你的炼金兽...</div>

        <div class="battlefield">
            <div class="monster-card" id="playerCard">
                <h4>🔮 你的炼金兽</h4>
                <div id="pName" style="font-weight: bold; color: var(--accent-color);">? ? ?</div>
                <div class="monster-avatar" id="pAvatar">(等待融合大阵激活)</div>
                <div id="pStats" style="font-weight: bold;">HP: -- | ATK: --</div>
                <div id="pSkill" style="font-size:0.85em; color:#aaa; margin-top:8px; min-height: 32px;">技能: --</div>
            </div>

            <div class="monster-card" id="enemyCard">
                <h4>👾 守关智能Boss</h4>
                <div id="eName" style="font-weight: bold; color: #ff3366;">末日赛博巨兽</div>
                <div class="monster-avatar" id="eAvatar">
  /\_/\
 ( o.o )
  > ^ <
[CYBER]
                </div>
                <div id="eStats" style="font-weight: bold;">HP: 120 | ATK: 24</div>
                <div id="eSkill" style="font-size:0.85em; color:#aaa; margin-top:8px; min-height: 32px;">技能: 毁灭射线 (对敌方造成无差别高额打击)</div>
            </div>
        </div>
        
        <button id="battleBtn" style="display: none; background: #ff3366; color: white;" onclick="startBattle()">⚔️ 派遣创造物，开始战斗！</button>
    </div>
</div>

<script>
    let playerMonster = null;
    const enemyMonster = { name: "末日赛博巨兽", hp: 120, atk: 24 };

    function startGame() {
        const key = document.getElementById('apiKey').value;
        const endpoint = document.getElementById('endpointId').value;
        if(!key || !endpoint) {
            alert('火山方舟模式下，API Key 和 接入点 ID (Endpoint ID) 均不能为空！');
            return;
        }
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
    }

    async function summonMonster() {
        const apiKey = document.getElementById('apiKey').value;
        const endpointId = document.getElementById('endpointId').value;
        const elemA = document.getElementById('elemA').value;
        const elemB = document.getElementById('elemB').value;
        const playerPrompt = document.getElementById('playerPrompt').value;

        if(!playerPrompt) {
            alert('炼金需要意志引导，请填写提示词！');
            return;
        }

        document.getElementById('summonBtn').disabled = true;
        document.getElementById('battleBtn').style.display = 'none';
        document.getElementById('playerCard').classList.remove('active');
        document.getElementById('gameStatus').innerText = "🔮 正在连接火山方舟，大模型正通过接入点实时推理属性、渲染图案...";

        const systemPrompt = `你是一款游戏后端的实时规则与视觉渲染引擎。
请根据玩家提供的两个基础元素和融合提示词，创造一个对战怪物。
必须严格返回以下标准 JSON 格式，不要包含任何 markdown 标记（绝对不要用 \`\`\`json 块包裹），直接输出大括号包裹的纯文本 JSON：
{
  "name": "怪物名字(10字以内)",
  "hp": 随机70-150之间的整数,
  "atk": 随机15-35之间的整数,
  "skill": "技能名字和简短说明",
  "ascii_art": "用普通符号画一幅符合该怪物形象的简易ASCII艺术画(高度4-5行，宽度20字符以内，内部绝对不能使用任何反引号，直接用换行符\\n分隔)"
}`;

        const userContent = `基础元素A: ${elemA}, 基础元素B: ${elemB}. 玩家融合创意: ${playerPrompt}`;

        try {
            // 请求地址更换为火山方舟 V3 端点
            const response = await fetch("https://ark.cn-beijing.volces.com/api/v3/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": endpointId, // 火山引擎规范：这里传入的必须是接入点ID
                    "messages": [
                        {"role": "system", "content": systemPrompt},
                        {"role": "user", "content": userContent}
                    ]
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "方舟接口调用失败");
            }

            const data = await response.json();
            let rawContent = data.choices[0].message.content.trim();
            
            // 兜底清洗：剔除不听话模型可能会带上的 Markdown 标记
            if (rawContent.startsWith("```")) {
                rawContent = rawContent.replace(/^```json?/, "").replace(/```$/, "").trim();
            }

            const result = JSON.parse(rawContent);
            
            playerMonster = result;
            document.getElementById('pName').innerText = result.name;
            document.getElementById('pAvatar').innerText = result.ascii_art || " (/)_(\) \n ( o.o ) \n  > ^ < ";
            document.getElementById('pStats').innerText = `HP: ${result.hp} | ATK: ${result.atk}`;
            document.getElementById('pSkill').innerText = `技能: ${result.skill}`;
            
            document.getElementById('playerCard').classList.add('active');
            document.getElementById('gameStatus').innerText = `✨ 召唤成功！方舟大阵中走出了【${result.name}】！`;
            document.getElementById('battleBtn').style.display = 'block';
        } catch (error) {
            console.error(error);
            document.getElementById('gameStatus').innerText = `❌ 召唤失败。原因: ${error.message}。请检查 Key 和 接入点 ID 是否匹配，或检查跨域控制。`;
        } finally {
            document.getElementById('summonBtn').disabled = false;
        }
    }

    function startBattle() {
        if(!playerMonster) return;
        document.getElementById('gameStatus').innerText = "⚔️ 战火已燃！";
        
        let pHp = playerMonster.hp;
        let eHp = enemyMonster.hp;
        let log = "⚔️ === 战斗回合播报 === ⚔️\n\n";

        log += `【${playerMonster.name}】仰天长啸，激活动态技能 [${playerMonster.skill.split('：')[0]}]！\n`;
        eHp -= playerMonster.atk;
        log += `💥 痛击守关Boss，造成了 ${playerMonster.atk} 点伤害！Boss 剩余生命: ${Math.max(0, eHp)}\n\n`;

        if(eHp > 0) {
            log += `【${enemyMonster.name}】陷入暴怒，回敬了一记 [毁灭射线]！\n`;
            pHp -= enemyMonster.atk;
            log += `💥 你的造物受到了 ${enemyMonster.atk} 点伤害！你剩余生命: ${Math.max(0, pHp)}\n\n`;
        }

        log += "🏁 === 结算结果 === 🏁\n";
        if(eHp <= 0) {
            log += `🏆 奇迹！你用 Prompt 编织出的 AI 生物成功击碎了赛博巨兽！`;
        } else if(pHp <= 0) {
            log += `💀 战败！再接再厉，调整下提示词重新炼金吧！`;
        } else {
            if(pHp > eHp) {
                log += `⚖️ 由于你的生物血量残余较多 (${pHp} vs ${eHp})，评委判定你获得小胜！`;
            } else {
                log += `⚖️ 回合结束，Boss 略微领先，你惜败！`;
            }
        }

        alert(log);
        document.getElementById('gameStatus').innerText = "战斗已完结。可以开启下一轮 Token 炼金！";
    }
</script>

</body>
</html>
