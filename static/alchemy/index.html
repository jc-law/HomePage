<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 字符艺术矩阵生成器 (1080p 黄金画幅版)</title>
    <style>
        :root {
            --bg: #0a0a0d;
            --panel: #141418;
            --accent: #00ffaa;
            --text: #e2e2e5;
        }
        
        /* 铺满全屏，杜绝整个网页出现滚动条 */
        html, body {
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* 紧凑型的顶部标题栏 */
        header {
            text-align: center;
            padding: 10px 0;
            background: #0f0f13;
            border-bottom: 1px solid #23232d;
            flex-shrink: 0;
        }
        header h2 { margin: 0; font-size: 20px; color: var(--accent); }
        header p { margin: 4px 0 0 0; color: #687; font-size: 12px; }

        /* 🎛️ 核心改动 1：左右分栏的双栏主战场 */
        .main-layout {
            display: flex;
            flex: 1;
            width: 100vw;
            box-sizing: border-box;
            padding: 15px;
            gap: 15px;
            overflow: hidden; /* 强制限定在首屏之内 */
        }

        /* 左侧控制台（占 35% 宽度） */
        .control-side {
            width: 35%;
            max-width: 400px;
            min-width: 300px;
            background: var(--panel);
            padding: 18px;
            border-radius: 10px;
            border: 1px solid #23232d;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* 🎨 核心改动 2：右侧画布（占全量剩余空间，强制单屏无滚动） */
        .canvas-side {
            flex: 1;
            background: #000;
            border: 1px solid #23232d;
            border-radius: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 字符矩阵渲染核心：严格控制字体大小和等宽 */
        #artCanvas {
            flex: 1;
            color: #00ff55;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 13px; /* 1080p 下最佳辨识度等宽大小 */
            line-height: 1.25;
            white-space: pre;
            padding: 20px;
            margin: 0;
            overflow: hidden; /* 严禁画布自己蹦出多余的滚动条 */
            background: #000;
            box-sizing: border-box;
        }

        /* 表单元素微调 */
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 12px; color: #889; font-weight: bold; }
        input, textarea, select, button {
            width: 100%; padding: 10px; margin-top: 2px;
            background: #1a1a24; border: 1px solid #2d2d3d;
            color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 13px;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); outline: none; }
        
        .row { display: flex; gap: 10px; }
        button { background: var(--accent); color: #000; font-weight: bold; border: none; cursor: pointer; transition: background 0.2s; margin-top: 5px; }
        button:hover { background: #00cc88; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        .btn-secondary { background: #23232d; color: #fff; border: 1px solid #2d2d3d; }
        .btn-secondary:hover { background: #2d2d3d; }

        #terminal {
            background: #050507; font-family: monospace; padding: 8px; border-radius: 6px;
            height: 50px; overflow-y: auto; font-size: 11px; color: #778; margin-top: auto; border: 1px solid #161622;
        }
    </style>
</head>
<body>

<header>
    <h2>🎨 AI 颜文字与字符艺术矩阵生成器</h2>
    <p>1080p 黄金分割版 • 严格物理画幅受限</p>
</header>

<div class="main-layout">
    <div class="control-side">
        <div class="input-group">
            <label>第一步：授权凭证</label>
            <div class="row">
                <input type="password" id="keyInput" placeholder="请输入密钥 (sk-or-v1-...)">
                <button class="btn-secondary" style="width: 120px; margin:0;" onclick="fetchLiveModels()">🔄 刷新列表</button>
            </div>
        </div>

        <div class="input-group">
            <label>第二步：编译引擎</label>
            <select id="modelInput">
                <option value="openrouter/free">🎁 openrouter/free (官方智能免费路由)</option>
            </select>
        </div>

        <div class="input-group">
            <label>第三步：微调你的画面幻想 (Prompt)</label>
            <textarea id="promptInput" rows="4" placeholder="例如：一架正在全速俯冲并朝前方发射两枚制导导弹的 F-22 猛禽战斗机，展现出极强的动态线条感和烟雾扩散效果。"></textarea>
        </div>

        <button id="generateBtn" onclick="generateAsciiArt()">✨ 开始流式矩阵渲染</button>

        <div id="terminal">> 系统就绪。右侧画布已在 1080p 框架下完成严格对齐。</div>
    </div>

    <div class="canvas-side">
        <div id="artCanvas">等待画布流式渲染投射...</div>
    </div>
</div>

<script>
    const logDiv = document.getElementById('terminal');
    const modelSelect = document.getElementById('modelInput');
    const canvasDiv = document.getElementById('artCanvas');

    function log(msg, color = "#888") {
        if (logDiv) {
            logDiv.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    }

    // 🔄 动态拉取模型列表逻辑 (保持静态首行安全注入)
    async function fetchLiveModels() {
        const key = document.getElementById('keyInput').value;
        log("正在拉取全量模型生态...", "#ffaa00");

        try {
            const headers = key ? { "Authorization": `Bearer ${key}` } : {};
            const response = await fetch("https://openrouter.ai/api/v1/models", { method: "GET", headers: headers });

            if (!response.ok) throw new Error(`HTTP 错误: ${response.status}`);
            const rawData = await response.json();
            const models = rawData.data;

            if (models && models.length > 0) {
                while (modelSelect.options.length > 1) { modelSelect.remove(1); }

                const freeModels = [];
                const paidModels = [];

                models.forEach(m => {
                    if (m.id === "openrouter/free") return;
                    if (m.id.includes(':free')) freeModels.push(m);
                    else paidModels.push(m);
                });

                freeModels.sort((a,b) => a.id.localeCompare(b.id));
                paidModels.sort((a,b) => a.id.localeCompare(b.id));

                const optGroupFree = document.createElement('optgroup');
                optGroupFree.label = "🎁 免费畅玩模型通道";
                freeModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.innerText = `✨ ${m.name}`;
                    optGroupFree.appendChild(opt);
                });
                modelSelect.appendChild(optGroupFree);

                const optGroupPaid = document.createElement('optgroup');
                optGroupPaid.label = "💰 商业全量旗舰模型";
                paidModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.innerText = `🪪 ${m.name}`;
                    optGroupPaid.appendChild(opt);
                });
                modelSelect.appendChild(optGroupPaid);

                log(`模型追加同步成功！`, "#00ffaa");
                alert("模型列表已动态更新！");
            }
        } catch (e) {
            log(`获取失败。保持默认免费通道运行。`, "#ff3366");
            alert(`无法更新列表: ${e.message}\n已保持第一行默认路由为您兜底！`);
        }
    }

    // ✨ 核心逻辑：严密控行控高，杜绝产生滚动条    
    // 🎨 流式实时渲染字符艺术矩阵
    async function generateAsciiArt() {
        const key = document.getElementById('keyInput').value;
        const model = document.getElementById('modelInput').value;
        const prompt = document.getElementById('promptInput').value;

        if(!key) { alert("请先填写 OpenRouter API Key！"); return; }
        if(!prompt) { alert("你想画什么？请输入画面描述！"); return; }

        document.getElementById('generateBtn').disabled = true;
        canvasDiv.style.color = "#00ff55";
        canvasDiv.innerText = ""; // 清空画布，准备实时作画
        log(`正在请求 [${model}] 开启流式矩阵渲染通道...`, "#ffcc00");

        const systemPrompt = `你是一个顶级字符画（ASCII Art）艺术编译器。请根据用户的描述，生成一张纯字符矩阵图形。
【画幅物理硬约束条件（极其重要，违反系统将死锁）】：
1. 你的整个图形输出横向宽度：必须严格控制在 120 到 140 个字符之间！这是为了配合 1080p 横向大画布的排版，请务必把画面横向撑满！
2. 纵向高度：控制在 25 到 35 行之间。绘制完主图案后请立刻闭合输出。
3. 只能吐出纯字符画矩阵本身。严禁带有任何 Markdown 标记（如 \`\`\` 符号）、普通文字说明或打招呼。

【画风与黑白构图要求】：
1. 核心重点：我们的背景画布已经是纯黑色的了！所以图案背景、天空中【空白、没有物体的地方】必须用空格（Space）来表示！绝对不允许用满屏幕的字符把背景填满！
2. 请发挥你的空间想象力，用密度不同的符号（如 @, #, *, +, =, -, :, ., 或者是特定的颜文字符号）组合出明暗与线条，使其像一幅悬浮在黑夜中的超大像素艺术品。`;

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": model,
                    "stream": true, // ⚡️ 开启流式传输，拒绝死等阻塞！
                    "messages": [
                        {"role": "system", "content": systemPrompt},
                        {"role": "user", "content": prompt}
                    ]
                })
            });

            if(!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `HTTP 错误: ${response.status}`);
            }

            // 🌊 处理流式文本读取
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                // 解码流式切片数据
                const chunk = decoder.decode(value, { stream: true });
                buffer += chunk;

                // OpenRouter 的流式返回是以 data: 开头的多行文本
                const lines = buffer.split("\n");
                // 留出最后一行不完整的 buffer
                buffer = lines.pop(); 

                for (const line of lines) {
                    const cleanedLine = line.trim();
                    if (!cleanedLine || cleanedLine === "data: [DONE]") continue;

                    if (cleanedLine.startsWith("data: ")) {
                        try {
                            const parsed = JSON.parse(cleanedLine.replace(/^data: /, ""));
                            const deltaText = parsed.choices?.[0]?.delta?.content || "";
                            
                            // 💥 重点：每收到一个符号，立刻无缝追加到黑画布里！
                            if (deltaText) {
                                // 过滤掉可能意外蹦出来的 markdown 反引号包裹
                                if (!deltaText.includes("```")) {
                                    canvasDiv.innerText += deltaText;
                                }
                            }
                        } catch (jsonErr) {
                            // 忽略流式解析中的碎片微错
                        }
                    }
                }
            }

            log(`画布流式渲染收尾成功！渲染引擎：${model}`, "#00ffaa");

        } catch (e) {
            canvasDiv.style.color = "#ff3366";
            canvasDiv.innerText = `\n画布坍塌。原因: ${e.message}`;
            log(`生成终止。错误核心: ${e.message}`, "#ff3366");
        } finally {
            document.getElementById('generateBtn').disabled = false;
        }
    }
</script>

</body>
</html>
