<a href="{{ .Site.BaseURL }}">
    {{ if .Site.Params.sidebar.avatar }}
        {{ $avatar := resources.Get .Site.Params.sidebar.avatar }}
        
        {{ if not $avatar }}
            {{ $avatar = resources.GetRemote .Site.Params.sidebar.avatar }}
        {{ end }}
        
        {{ with $avatar }}
            <img src="{{ .RelPermalink }}" 
                 width="300" 
                 height="300" 
                 style="border-radius: 12px !important; object-fit: contain !important;" 
                 alt="Avatar" 
                 loading="lazy">
        {{ end }}
    {{ end }}
</a>

<style>
    .avatar-container,
    [class*="avatar-container"],
    .sidebar .avatar-container {
        border-radius: 12px !important;
        clip-path: none !important;
        -webkit-clip-path: none !important;
        mask-image: none !important;
        -webkit-mask-image: none !important;
        overflow: hidden !important;
    }
</style>
