<a href="{{ .Site.BaseURL }}">
    {{ if .Site.Params.sidebar.avatar }}
        {{ $avatar := resources.Get .Site.Params.sidebar.avatar }}
        
        {{ if not $avatar }}
            {{ $avatar = resources.GetRemote .Site.Params.sidebar.avatar }}
        {{ end }}
        
        {{ with $avatar }}
            <img src="{{ .RelPermalink }}" 
                 width="300" 
                 height="300" 
                 style="border-radius: 12px !important; object-fit: cover !important;" 
                 alt="Avatar" 
                 loading="lazy">
        {{ end }}
    {{ end }}
</a>

<!-- ⚡ 终极降维打击：用最长的套娃路径，强行震碎它的高权重 ⚡ -->
<style>
    html body .main-container .left-sidebar .header .avatar-container,
    .main-container .left-sidebar .header .avatar-container,
    .avatar-container {
        border-radius: 12px !important;
        clip-path: none !important;
        -webkit-clip-path: none !important;
        mask-image: none !important;
        -webkit-mask-image: none !important;
    }
</style>
